<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Q-02 关系图</title>
  <style>
    :root { --ink:#22252b; --muted:#69707a; --line:#4e5560; --purple:#8b78ef; --paper:#faf9f6; }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; background:#f6f5f2; color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
    header { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:18px 26px; border-bottom:1px solid #deddd9; background:rgba(255,255,255,.92); }
    .title { display:flex; align-items:baseline; gap:14px; min-width:0; }
    h1 { margin:0; font-size:20px; letter-spacing:-.02em; white-space:nowrap; }
    .subtitle { color:var(--muted); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    nav { display:flex; gap:8px; }
    button { border:1px solid #ccd0d6; border-radius:10px; padding:9px 14px; color:#4d5560; background:#fff; font-weight:700; cursor:pointer; }
    button.active { border-color:#6d5ee8; color:#fff; background:#6d5ee8; }
    .viewport { position:relative; height:calc(100vh - 68px); min-height:690px; overflow:auto; background:
      linear-gradient(#ecebe7 1px, transparent 1px), linear-gradient(90deg,#ecebe7 1px,transparent 1px), #faf9f6;
      background-size:28px 28px; }
    .canvas { width:1800px; height:980px; transform-origin:0 0; transition:transform .16s ease; }
    .panel { display:none; }
    .panel.active { display:block; }
    svg { display:block; width:1800px; height:980px; }
    .node rect { stroke-width:2; rx:4; }
    .node text { fill:#272a30; text-anchor:middle; font-weight:700; }
    .node .main { font-size:21px; }
    .node .sub { fill:#626873; font-size:13px; font-weight:600; }
    .edge { fill:none; stroke:var(--line); stroke-width:2.1; marker-end:url(#arrow); }
    .edge.dashed { stroke-dasharray:7 6; }
    .edge.return { stroke:#c45142; stroke-width:3; marker-end:url(#arrowRed); }
    .edge.agent { stroke:#6d5ee8; stroke-width:2.5; marker-end:url(#arrowPurple); }
    .label-bg { fill:#faf9f6; opacity:.96; }
    .edge-label { fill:#555b65; font-size:14px; font-weight:700; text-anchor:middle; }
    .boundary { fill:none; stroke:#b9b4d8; stroke-width:2; stroke-dasharray:10 8; rx:18; }
    .boundary-title { fill:#6d5ee8; font-size:14px; font-weight:800; letter-spacing:.08em; }
    .legend { position:fixed; left:22px; bottom:20px; display:flex; gap:12px; flex-wrap:wrap; z-index:5; padding:10px 13px; border:1px solid #d7d6d2; border-radius:12px; background:rgba(255,255,255,.92); box-shadow:0 6px 24px rgba(0,0,0,.07); }
    .legend span { display:flex; align-items:center; gap:6px; color:#5b616b; font-size:12px; font-weight:700; }
    .dot { width:10px; height:10px; border-radius:2px; }
    .controls { position:fixed; right:22px; bottom:20px; z-index:6; display:grid; grid-template-columns:repeat(3,44px); gap:7px; }
    .controls button { width:44px; height:44px; padding:0; font-size:22px; background:rgba(255,255,255,.95); }
    .controls .fit { grid-column:1 / 4; width:auto; font-size:13px; }
    @media (max-width:800px) { .subtitle{display:none}.viewport{height:calc(100vh - 64px)}.legend{right:22px;bottom:78px}.canvas{transform:scale(.65)} }
  </style>
</head>
<body>
  <header>
    <div class="title"><h1>Q-02 · 方案 2 · 目标已批准</h1><span class="subtitle">原件 + 结构化知识 + 行动事件 + 可重建索引 · 三个红色缺口执行中</span></div>

          <g class="node"><rect x="44" y="575" width="220" height="92" fill="#f3eee0" stroke="#c9a84b"/><text x="154" y="615" class="main">用户输入</text><text x="154" y="640" class="sub">目标 · 问题 · 授权 · 反馈</text></g>

          <g class="node"><rect x="390" y="290" width="235" height="108" fill="#e9f0f8" stroke="#6c91bd"/><text x="508" y="332" class="main">Material 原件</text><text x="508" y="360" class="sub">原文 · 来源 · 时间 · 版本</text></g>
          <g class="node"><rect x="720" y="290" width="235" height="108" fill="#fff2c8" stroke="#d0a52a"/><text x="838" y="332" class="main">Evidence 依据</text><text x="838" y="360" class="sub">本次判断真正引用的内容</text></g>

          <g class="node"><rect x="1405" y="290" width="230" height="108" fill="#e3f4e8" stroke="#62a775"/><text x="1520" y="332" class="main">ActionItem</text><text x="1520" y="360" class="sub">目标 · 负责人 · 下一步 · 状态</text></g>

          <g class="node"><rect x="1050" y="520" width="255" height="98" fill="#f1e8f7" stroke="#a16bb8"/><text x="1178" y="560" class="main">Relation 关系</text><text x="1178" y="586" class="sub">支持 · 冲突 · 更新 · 导致 · 属于</text></g>
          <g class="node"><rect x="1405" y="520" width="230" height="98" fill="#e0f1ef" stroke="#4c9b91"/><text x="1520" y="560" class="main">WorkEvent / 结果</text><text x="1520" y="586" class="sub">完成 · 失败 · 验证 · 新发现</text></g>

          <g class="node"><rect x="1050" y="38" width="255" height="90" fill="#fff0ed" stroke="#d46657"/><text x="1178" y="75" class="main">Owner</text><text x="1178" y="101" class="sub">确认 · 否决 · 授权</text></g>
          <g class="node"><rect x="1405" y="38" width="230" height="90" fill="#ebe8ff" stroke="#6d5ee8"/><text x="1520" y="75" class="main">主 Agent</text><text x="1520" y="101" class="sub">读取 · 判断 · 调用工具 · 写回</text></g>

          <path d="M1520 128 C1680 180 1680 520 1635 558" class="edge agent"/>

          <g class="node"><rect x="350" y="840" width="300" height="78" fill="#fff0ed" stroke="#d46657"/><text x="500" y="871" class="main">当前缺口 1</text><text x="500" y="897" class="sub">原件没有不可变版本 / hash</text></g>
          <g class="node"><rect x="750" y="840" width="300" height="78" fill="#fff0ed" stroke="#d46657"/><text x="900" y="871" class="main">当前缺口 2</text><text x="900" y="897" class="sub">Agent 仍能把状态设为 confirmed</text></g>
          <g class="node"><rect x="1150" y="840" width="300" height="78" fill="#fff0ed" stroke="#d46657"/><text x="1300" y="871" class="main">当前缺口 3</text><text x="1300" y="897" class="sub">执行结果尚未回写结构化知识</text></g>

          <rect x="1275" y="636" width="102" height="25" class="label-bg"/><text x="1326" y="653" class="edge-label">结果回流</text>
          <rect x="1130" y="173" width="96" height="25" class="label-bg"/><text x="1178" y="190" class="edge-label">Owner确认</text>
          <rect x="752" y="610" width="116" height="25" class="label-bg"/><text x="810" y="627" class="edge-label">随时重建</text>
        </svg>
      </section>

      <section id="team" class="panel">
        <svg viewBox="0 0 1800 980" role="img" aria-label="团队协作关系图">
          <defs>
            <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4e5560"/></marker>
            <marker id="arrow2r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#c45142"/></marker>
          </defs>
          <style>.t-edge{fill:none;stroke:#4e5560;stroke-width:2.5;marker-end:url(#arrow2)}.t-return{fill:none;stroke:#c45142;stroke-width:3;marker-end:url(#arrow2r)}</style>

          <g class="node"><rect x="130" y="390" width="280" height="130" fill="#fff0ed" stroke="#d46657"/><text x="270" y="436" class="main">① 判断</text><text x="270" y="470" class="sub">当前窗口 + Owner</text><text x="270" y="494" class="sub">产品方向 · 方案 · 优先级 · 授权</text></g>
          <g class="node"><rect x="545" y="145" width="300" height="130" fill="#e9f0f8" stroke="#6c91bd"/><text x="695" y="191" class="main">② 调研</text><text x="695" y="225" class="sub">G1 · G3B</text><text x="695" y="249" class="sub">源码 · 工具 · 竞品 · 方案证据</text></g>

          <path d="M1110 455 L1390 455" class="t-edge"/>
          <path d="M900 520 L900 680" class="t-edge"/>

          <rect x="805" y="587" width="190" height="34" class="label-bg"/><text x="900" y="610" class="edge-label">反馈直接回到下一轮判断</text>
        </svg>
      </section>
    </div>
  </div>

  <div class="legend" id="legend"><span><i class="dot" style="background:#e9f0f8"></i>原件</span><span><i class="dot" style="background:#fff2c8"></i>依据</span><span><i class="dot" style="background:#ebe8ff"></i>知识/Agent</span><span><i class="dot" style="background:#e3f4e8"></i>行动</span><span><i class="dot" style="background:#f1e8f7"></i>关系/结果</span></div>
  <div class="controls"><button id="minus">−</button><button id="reset">↺</button><button id="plus">＋</button><button class="fit" id="fit">适合窗口</button></div>

  <script>
    const canvas = document.getElementById('canvas');
    const viewport = document.getElementById('viewport');
    const knowledge = document.getElementById('knowledge');
    const team = document.getElementById('team');
    const knowledgeBtn = document.getElementById('knowledgeBtn');
    const teamBtn = document.getElementById('teamBtn');
    const legend = document.getElementById('legend');
    let scale = 1;
    function apply(){ canvas.style.transform = `scale(${scale})`; canvas.style.width = `${1800*scale}px`; canvas.style.height = `${980*scale}px`; }
    function fit(){ scale = Math.min((viewport.clientWidth-30)/1800,(viewport.clientHeight-30)/980); apply(); viewport.scrollTo(0,0); }
    function show(which){ const isK = which==='knowledge'; knowledge.classList.toggle('active',isK); team.classList.toggle('active',!isK); knowledgeBtn.classList.toggle('active',isK); teamBtn.classList.toggle('active',!isK); legend.style.display=isK?'flex':'none'; fit(); }
    knowledgeBtn.onclick=()=>show('knowledge'); teamBtn.onclick=()=>show('team');
    document.getElementById('plus').onclick=()=>{scale=Math.min(1.5,scale+.1);apply()};
    document.getElementById('minus').onclick=()=>{scale=Math.max(.35,scale-.1);apply()};
    document.getElementById('reset').onclick=()=>{scale=1;apply();viewport.scrollTo(0,0)};
    document.getElementById('fit').onclick=fit;
    window.addEventListener('resize',fit); fit();
  </script>
</body>
</html>
