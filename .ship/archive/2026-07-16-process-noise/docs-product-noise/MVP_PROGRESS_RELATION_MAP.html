<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fc-opc-ibot · MVP 开发关系图</title>
  <style>
    :root {
      --bg: #f6f6f3;
      --panel: rgba(255,255,255,.95);
      --ink: #17181a;
      --muted: #6f7278;
      --line: #d9d9d3;
      --blue: #5377d6;
      --blue-soft: #eef3ff;
      --violet: #7367d9;
      --violet-soft: #f2efff;
      --green: #3b8a6e;
      --green-soft: #eaf7f1;
      --orange: #c97936;
      --orange-soft: #fff3e8;
      --red: #c85f52;
      --red-soft: #fff0ed;
      --shadow: 0 18px 52px rgba(34,36,42,.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background:
        linear-gradient(rgba(45,48,55,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45,48,55,.035) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
    }
    main { width: min(1840px, calc(100vw - 32px)); margin: 0 auto; padding: 34px 0 56px; }
    header { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin: 0 16px 22px; }
    h1 { margin: 0; font-size: clamp(28px, 3vw, 48px); letter-spacing: -.04em; }
    .lead { margin: 10px 0 0; color: var(--muted); font-size: 16px; }
    .stamp { flex: 0 0 auto; padding: 10px 14px; border: 1px solid #d9d9d3; border-radius: 999px; background: #fff; color: #55585e; font-size: 13px; }
    section { min-width: 0; margin-top: 24px; padding: 20px; border: 1px solid #e1e1dc; border-radius: 24px; background: var(--panel); box-shadow: var(--shadow); }
    .section-head { display: flex; justify-content: space-between; align-items: baseline; gap: 24px; padding: 4px 8px 14px; }
    .section-head h2 { margin: 0; font-size: 21px; letter-spacing: -.02em; }
    .section-head p { margin: 0; color: var(--muted); font-size: 13px; }
    .canvas { width: 100%; min-width: 0; overflow: auto; border-radius: 18px; background: radial-gradient(circle at 50% 18%, #fff 0, #fafaf8 58%, #f3f3ef 100%); }
    svg { display: block; width: 100%; min-width: 1120px; height: auto; }
    .cluster { fill: rgba(255,255,255,.78); stroke: #d9dce8; stroke-width: 2; stroke-dasharray: 9 8; }
    .node { stroke-width: 2; rx: 16; ry: 16; }
    .done { fill: var(--green-soft); stroke: #75ad98; }
    .current { fill: var(--red-soft); stroke: #d1766a; }
    .problem { fill: var(--orange-soft); stroke: #dda56d; }
    .build { fill: var(--violet-soft); stroke: #9a8cea; }
    .outcome { fill: var(--blue-soft); stroke: #7894e4; }
    .neutral { fill: #fff; stroke: #cfd1d6; }
    .secretary { fill: #f4f1ff; stroke: #9a8cea; }
    .canonical { fill: #fff7dc; stroke: #d3af53; }
    .label { font-size: 16px; font-weight: 730; fill: #23252a; text-anchor: middle; }
    .sub { font-size: 12.5px; font-weight: 500; fill: #62666d; text-anchor: middle; }
    .tiny { font-size: 11px; font-weight: 650; fill: #777b83; letter-spacing: .04em; text-anchor: middle; }
    .edge { fill: none; stroke: #777b84; stroke-width: 2; marker-end: url(#arrow); }
    .edge-strong { fill: none; stroke: var(--violet); stroke-width: 3; marker-end: url(#arrow-violet); }
    .edge-green { fill: none; stroke: var(--green); stroke-width: 3; marker-end: url(#arrow-green); }
    .edge-dash { fill: none; stroke: #9a8cea; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow-violet); }
    .edge-label { font-size: 11px; font-weight: 650; fill: #62666d; text-anchor: middle; paint-order: stroke; stroke: #fafaf8; stroke-width: 6; stroke-linejoin: round; }
    .pill { fill: #fff; stroke: #d7d8dd; }
    .pill-text { font-size: 12px; font-weight: 700; fill: #4b4e54; text-anchor: middle; }
    .legend { display: flex; flex-wrap: wrap; gap: 9px; margin: 14px 8px 0; }
    .legend span { display: inline-flex; gap: 7px; align-items: center; padding: 7px 10px; background: #fff; border: 1px solid #e0e0dc; border-radius: 999px; color: #62666d; font-size: 12px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 8px 2px; }
    .actions a { color: #264c9a; text-decoration: none; padding: 10px 13px; border-radius: 10px; border: 1px solid #cfd8f2; background: #f4f7ff; font-size: 13px; font-weight: 650; }
    @media (max-width: 760px) {
      main { width: calc(100vw - 16px); padding-top: 18px; }
      header { align-items: flex-start; flex-direction: column; }
      section { padding: 10px; border-radius: 18px; }
      .section-head { align-items: flex-start; flex-direction: column; gap: 6px; }
    }
  </style>
</head>
